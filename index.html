<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Trending Daily Reports</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔥 GitHub Trending Daily Reports</h1>
      <p class="subtitle">AI-generated introductions for newly trending projects, curated and updated every day.</p>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value accent">1</div>
        <div class="stat-label">Reports</div>
      </div>
      <div class="stat">
        <div class="stat-value green">12</div>
        <div class="stat-label">Projects Tracked</div>
      </div>
      <div class="stat">
        <div class="stat-value star">⭐</div>
        <div class="stat-label">Daily Updates</div>
      </div>
    </div>

    <ul class="report-list">
      <li>
        <a href="reports/2026-04-11.html">
          <span class="report-date">📋 2026-04-11 <span class="report-count">12 projects</span></span>
          <span class="report-arrow">→</span>
        </a>
      </li>
    </ul>

    <div class="footer">
      <p>Powered by GitHub Copilot CLI • Updated daily at 8:00 AM CST</p>
      <div class="footer-links">
        <a href="https://github.com/Yan22022/github_trend">⭐ Source Code</a>
        <a href="https://github.com/trending">📈 GitHub Trending</a>
      </div>
    </div>
  </div>
</body>
</html>
